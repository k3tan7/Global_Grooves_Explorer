<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Grooves Explorer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container nav-content">
            <div class="brand">Global Grooves</div>
            <ul class="nav-links">
                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="favorites.html">Favorites</a></li>
                <li><a href="about.html">About</a></li>
                <li><button id="mode-toggle" class="btn-secondary">Dark Mode</button></li>
            </ul>
        </div>
    </nav>

    <header class="hero">
        <div class="container">
            <h1>World Radio Directory</h1>
            <p>Explore live broadcasts from across the globe</p>

            <div class="filter-controls">
                <input type="text" id="user-search" placeholder="Search by name...">
                <select id="user-sort">
                    <option value="default">Sort by</option>
                    <option value="az">A to Z</option>
                    <option value="za">Z to R</option>
                </select>
            </div>
            <div id="loader">Retrieving stations...</div>
        </div>
    </header>

    <main class="container">
        <div id="playback-bar" class="hidden">
            <div class="player-info">
                <span id="now-playing-name">No station selected</span>
                <audio id="audio-engine" controls></audio>
            </div>
        </div>

        <div id="station-list"></div>
    </main>

    <script src="script.js"></script>
</body>
</html>
